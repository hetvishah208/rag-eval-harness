name: rag-eval-ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  smoke-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
      - name: Pull small models (CI uses tiny models for speed)
        run: |
          ollama pull tinyllama
          ollama pull nomic-embed-text
      - name: Lint imports & unit tests
        run: |
          python -m pytest tests/ -q
      - name: Smoke eval (10-question subset)
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/huggingface/transformers.git data/raw
          cd data/raw && git sparse-checkout set docs/source/en && cd ../..
          python -m src.ingest.chunk_docs --raw-dir data/raw --chunk-sizes 256
          python -m src.ingest.build_index --chunk-size 256 --config config/default.yaml
          python -m src.eval.run_eval --config config/experiments_ci.yaml
        env:
          OLLAMA_HOST: "127.0.0.1:11434"
      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results/