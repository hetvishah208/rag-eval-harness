# Experiment configurations for RAG Eval Harness
# Each config varies one axis from its neighbor for clean comparison

defaults:
  generator_model: "phi3:mini"
  judge_model: "mistral:7b-instruct-q4_0"
  judge_embeddings: "nomic-embed-text"
  vector_store: "chromadb"
  corpus_path: "data/raw/"
  processed_path: "data/processed/"
  results_path: "results/"
  eval_dataset: "data/eval/gold_qa.json"

configs:
  A:
    name: "MiniLM / 256 / top-3 / no rerank"
    chunk_size: 256
    chunk_overlap: 50
    embedding_model: "all-MiniLM-L6-v2"
    top_k: 3
    reranker: null
    collection_name: "minilm_256"

  B:
    name: "MiniLM / 512 / top-5 / no rerank"
    chunk_size: 512
    chunk_overlap: 100
    embedding_model: "all-MiniLM-L6-v2"
    top_k: 5
    reranker: null
    collection_name: "minilm_512"

  C:
    name: "BGE-small / 256 / top-3 / no rerank"
    chunk_size: 256
    chunk_overlap: 50
    embedding_model: "BAAI/bge-small-en-v1.5"
    top_k: 3
    reranker: null
    collection_name: "bge_256"

  D:
    name: "BGE-small / 256 / top-3 / with rerank"
    chunk_size: 256
    chunk_overlap: 50
    embedding_model: "BAAI/bge-small-en-v1.5"
    top_k: 3
    reranker: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    rerank_top_n: 10  # over-fetch this many, rerank to top_k
    collection_name: "bge_256"  # reuses C's index; reranking is query-time only
