# CI-only: minimal matrix + tiny judge so GitHub Actions free runners finish fast.
# Real evaluation uses config/experiments.yaml locally.
defaults:
  generator_model: "tinyllama"
  judge_model: "tinyllama"
  judge_embeddings: "nomic-embed-text"
  vector_store: "chromadb"
  corpus_path: "data/raw/"
  processed_path: "data/processed/"
  results_path: "results/"
  eval_dataset: "data/eval/gold_qa_ci.json"
configs:
  A:
    name: "CI smoke: BGE / 256 / top-3"
    chunk_size: 256
    chunk_overlap: 50
    embedding_model: "BAAI/bge-small-en-v1.5"
    top_k: 3
    reranker: null
    collection_name: "bge_256"