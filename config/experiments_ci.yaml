# CI-only: minimal matrix + tiny judge so GitHub Actions free runners finish fast.
# Real evaluation uses config/experiments.yaml locally.
defaults:
  generator_model: "phi3:mini"
  judge_model: "phi3:mini"            # tiny judge for CI speed only
  judge_embeddings: "nomic-embed-text"
  vector_store: "chromadb"
  corpus_path: "data/raw/"
  processed_path: "data/processed/"
  results_path: "results/"
  eval_dataset: "data/eval/gold_qa.json"

configs:
  A:
    name: "CI smoke: MiniLM / 256 / top-3"
    chunk_size: 256
    chunk_overlap: 50
    embedding_model: "all-MiniLM-L6-v2"
    top_k: 3
    reranker: null
    collection_name: "minilm_256"
